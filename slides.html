<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Data Workshop — Slides / สไลด์ / 幻灯片</title>
<style>
  :root{
    --bg:#0f172a; --bg2:#1e293b; --card:#1e293b;
    --accent:#38bdf8; --accent2:#a78bfa; --green:#34d399;
    --text:#e2e8f0; --muted:#94a3b8; --border:#334155;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,"Segoe UI","Sarabun","Noto Sans SC",system-ui,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e1b4b);
    color:var(--text);overflow:hidden;
  }
  .deck{height:100vh;display:flex;align-items:center;justify-content:center}
  .slide{
    display:none;width:min(960px,92vw);max-height:88vh;overflow:auto;
    background:rgba(30,41,59,.6);border:1px solid var(--border);
    border-radius:24px;padding:48px 56px;
    box-shadow:0 30px 80px rgba(0,0,0,.45);backdrop-filter:blur(8px);
    animation:fade .4s ease;
  }
  .slide.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  h1{font-size:2.6rem;line-height:1.2;margin-bottom:18px;
     background:linear-gradient(90deg,var(--accent),var(--accent2));
     -webkit-background-clip:text;background-clip:text;color:transparent}
  h2{font-size:2rem;margin-bottom:22px;color:#fff}
  h2 .num{color:var(--accent);font-size:1.1rem;display:block;margin-bottom:6px;letter-spacing:2px}
  p{font-size:1.2rem;line-height:1.7;color:var(--muted);margin-bottom:14px}
  ul{list-style:none;margin:10px 0}
  li{font-size:1.25rem;line-height:1.9;padding-left:34px;position:relative}
  li::before{content:"▹";position:absolute;left:6px;color:var(--accent);font-weight:bold}
  .lead{font-size:1.4rem;color:var(--text)}
  .tag{display:inline-block;background:rgba(56,189,248,.15);color:var(--accent);
       border:1px solid rgba(56,189,248,.35);border-radius:999px;
       padding:5px 16px;font-size:1rem;margin:0 8px 10px 0}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px}
  .card{background:rgba(15,23,42,.6);border:1px solid var(--border);
        border-radius:16px;padding:20px;text-align:center}
  .card .ico{font-size:2.4rem;display:block;margin-bottom:10px}
  .card b{color:#fff;font-size:1.15rem}
  .card span{display:block;color:var(--muted);font-size:.95rem;margin-top:6px}
  pre{background:#0b1120;border:1px solid var(--border);border-radius:12px;
      padding:18px 20px;overflow:auto;margin:16px 0}
  code{font-family:"SFMono-Regular",Consolas,monospace;font-size:1.05rem;color:var(--green);white-space:pre}
  .flow{font-size:1.15rem;text-align:center;line-height:2.2;color:var(--text)}
  .flow b{color:var(--accent)}
  table{width:100%;border-collapse:collapse;margin-top:18px;font-size:1.05rem}
  th,td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--border)}
  th{color:var(--accent)}
  td:first-child{font-weight:bold;color:#fff}
  .center{text-align:center}
  .hint{font-size:1.05rem;color:var(--muted);margin-top:24px;font-style:italic}
  .bar{position:fixed;bottom:0;left:0;right:0;display:flex;align-items:center;
       justify-content:space-between;padding:16px 28px;color:var(--muted);font-size:.95rem}
  .btn{background:var(--card);border:1px solid var(--border);color:var(--text);
       border-radius:10px;padding:9px 16px;cursor:pointer;font-size:1rem}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .progress{position:fixed;top:0;left:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s}
  .quote{border-left:4px solid var(--accent2);padding-left:20px;color:var(--text);font-size:1.25rem;font-style:italic}
  .robot{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.35);
          border-radius:14px;padding:18px 22px;margin-top:20px;font-size:1.1rem}
  .robot b{color:var(--accent2)}
  /* language switcher */
  .lang{position:fixed;top:16px;right:20px;display:flex;gap:6px;z-index:10}
  .lang button{background:rgba(30,41,59,.8);border:1px solid var(--border);
       color:var(--muted);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:.95rem}
  .lang button.on{border-color:var(--accent);color:var(--accent);background:rgba(56,189,248,.12)}
</style>
</head>

      L("Data-quality checks / add your own dataset","ตรวจ data quality / เพิ่ม dataset ของตัวเอง","数据质量检查 / 添加你自己的数据集"),
    ],
    robot: L("Use Claude Code as your pair: design → code → debug → explain","ใช้ Claude Code เป็นคู่หู: ออกแบบ → เขียนโค้ด → debug → อธิบาย","把 Claude Code 当搭档：设计 → 编码 → 调试 → 讲解") },

  // 12 — closing
  { layout:"closing",
    title: L("Let's get started! 🚀","เริ่มกันเลย! 🚀","开始吧! 🚀"),
    lead:  L("Open a terminal in the workshop folder and type","เปิด terminal ในโฟลเดอร์ workshop แล้วพิมพ์","在工作坊目录打开终端并输入"),
    code:  "cp .env.example .env\ndocker compose up -d\nclaude",
    quote: L("\"Don't memorize commands — describe what you want, and let Claude build it\"","\"แทนที่จะจำคำสั่ง — ให้สั่งงานเป็นภาษาคน แล้วให้ Claude ช่วยทำ\"","\"不必死记命令——用自然语言描述需求，让 Claude 来完成\""),
    hint:  L("Per-module details live in the <b>modules/</b> folder","รายละเอียดแต่ละโมดูลอยู่ในโฟลเดอร์ <b>modules/</b>","每个模块的细节都在 <b>modules/</b> 文件夹中") },
];

// ===== state =====
let lang = localStorage.getItem('bdw_lang') || 'en';
let i = 0;
const stage = document.getElementById('stage');

function g(v){ return (v && typeof v==='object' && ('en' in v)) ? (v[lang] ?? v.en) : v; }

// ===== renderers =====
function render(s){
  switch(s.layout){
    case "title":
      return `<section class="slide center">
        <span class="tag">${g(s.tag)}</span>
        <h1>${g(s.title)}</h1>
        <p class="lead">${g(s.lead)}</p>
        <div class="grid" style="margin-top:30px">
          ${s.cards.map(c=>`<div class="card"><span class="ico">${c.ico}</span><b>${c.name}</b><span>${g(c.sub)}</span></div>`).join('')}
        </div>
        <p class="hint">${g(s.hint)}</p></section>`;
    case "flow":
      return `<section class="slide">
        <h2><span class="num">${g(s.num)}</span>${g(s.h2)}</h2>
        ${g(s.p)?`<p>${g(s.p)}</p>`:''}
        <div class="flow" style="margin-top:20px">${g(s.flow)}</div>
        <p class="hint">${g(s.hint)}</p></section>`;
    case "toolTable":
      return `<section class="slide">
        <h2><span class="num">${g(s.num)}</span>${g(s.h2)}</h2>
        <table><tr>${s.head.map(h=>`<th>${g(h)}</th>`).join('')}</tr>
        ${s.rows.map(r=>`<tr><td>${r[0]}</td><td>${g(r[1])}</td><td>${g(r[2])}</td></tr>`).join('')}
        </table></section>`;
    case "module":
      return `<section class="slide">
        <h2><span class="num">${g(s.num)}</span>${g(s.h2)}</h2>
        <p>${g(s.p)}</p>
        <pre><code>${esc(g(s.code))}</code></pre>
        ${s.p2?`<p>${g(s.p2)}</p>`:''}
        <div class="robot">🤖 <b>${g(UI.ask)}</b> "${g(s.robot)}"</div></section>`;
    case "compareTable":
      return `<section class="slide">
        <h2><span class="num">${g(s.num)}</span>${g(s.h2)}</h2>
        <table><tr>${s.head.map(h=>`<th>${g(h)}</th>`).join('')}</tr>
        ${s.rows.map(r=>`<tr>${r.map((c,k)=>k===0?`<td>${g(c)}</td>`:`<td>${g(c)}</td>`).join('')}</tr>`).join('')}
        </table>
        <p class="hint">${g(s.hint)}</p></section>`;
    case "project":
      return `<section class="slide">
        <h2><span class="num">${g(s.num)}</span>${g(s.h2)}</h2>
        <p>${g(s.p)}</p>
        <ul>${s.items.map(it=>`<li>${g(it)}</li>`).join('')}</ul>
        <div class="robot">🤖 ${g(s.robot)}</div></section>`;
    case "closing":
      return `<section class="slide center">
        <h1>${g(s.title)}</h1>
        <p class="lead">${g(s.lead)}</p>
        <pre style="text-align:left;display:inline-block"><code>${esc(s.code)}</code></pre>
        <p class="quote" style="margin-top:30px">${g(s.quote)}</p>
        <p class="hint">${g(s.hint)}</p></section>`;
  }
  return '';
}
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== drive =====
function show(n){
  i = Math.max(0, Math.min(SLIDES.length-1, n));
  stage.innerHTML = render(SLIDES[i]);
  stage.firstElementChild.classList.add('active');
  document.getElementById('counter').textContent = (i+1)+' / '+SLIDES.length;
  document.getElementById('progress').style.width = ((i+1)/SLIDES.length*100)+'%';
}
function setLang(l){
  lang = l; localStorage.setItem('bdw_lang', l);
  document.documentElement.lang = (l==='zh'?'zh-CN':l);
  document.querySelectorAll('#lang button').forEach(b=>b.classList.toggle('on', b.dataset.lang===l));
  document.getElementById('prevBtn').textContent = g(UI.prev);
  document.getElementById('nextBtn').textContent = g(UI.next);
  show(i);
}

document.getElementById('prevBtn').onclick = ()=>show(i-1);
document.getElementById('nextBtn').onclick = ()=>show(i+1);
document.querySelectorAll('#lang button').forEach(b=> b.onclick = ()=>setLang(b.dataset.lang));
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown') show(i+1);
  if(e.key==='ArrowLeft'||e.key==='PageUp') show(i-1);
  if(e.key==='Home') show(0);
  if(e.key==='End') show(SLIDES.length-1);
});

setLang(lang);
</script>
</body>
</html>
